<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Liftori</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #060B18;
      --blue: #0EA5E9;
      --light-blue: #7DD3FC;
      --white-ice: #E0F7FF;
    }
    body { background: var(--navy); color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,11,24,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #fff; letter-spacing: 0.05em; }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.7); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-cta {
      background: var(--blue); color: #fff !important;
      padding: 0.5rem 1.25rem; border-radius: 9999px;
      font-weight: 600 !important; font-size: 0.875rem !important;
    }
    .nav-cta:hover { background: var(--light-blue) !important; color: var(--navy) !important; }

    .blog-hero {
      padding: 5rem 2rem 3rem; max-width: 860px; margin: 0 auto; text-align: center;
    }
    .blog-hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 0.02em; margin-bottom: 1rem;
    }
    .blog-hero p { color: rgba(255,255,255,0.6); font-size: 1.125rem; line-height: 1.6; }

    .posts-grid {
      max-width: 860px; margin: 0 auto; padding: 2rem;
      display: flex; flex-direction: column; gap: 2rem;
    }
    .post-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 2rem;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .post-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(14,165,233,0.3);
      transform: translateY(-2px);
    }
    .post-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .post-tag {
      background: rgba(14,165,233,0.15); color: var(--light-blue);
      padding: 0.25rem 0.75rem; border-radius: 9999px;
      font-size: 0.75rem; font-family: 'DM Mono', monospace;
    }
    .post-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.3; }
    .post-card .excerpt { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.25rem; }
    .post-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
    .post-meta .author { color: rgba(255,255,255,0.6); font-weight: 500; }
    .read-more { color: var(--blue); font-size: 0.875rem; font-weight: 600; }

    #post-view { max-width: 720px; margin: 0 auto; padding: 2rem; display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: rgba(255,255,255,0.6); font-size: 0.875rem;
      margin-bottom: 2rem; cursor: pointer;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .back-btn:hover { color: #fff; }
    .post-title { font-size: clamp(1.8rem, 4vw, 2.75rem); font-weight: 700; line-height: 1.2; margin-bottom: 1rem; }
    .post-content { color: rgba(255,255,255,0.8); line-height: 1.8; font-size: 1.0625rem; }
    .post-content h2 { color: #fff; font-size: 1.5rem; margin: 2rem 0 1rem; }
    .post-content h3 { color: #fff; font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
    .post-content p { margin-bottom: 1.25rem; }
    .post-content ul, .post-content ol { margin: 0 0 1.25rem 1.5rem; }
    .post-content li { margin-bottom: 0.5rem; }
    .post-content a { color: var(--light-blue); text-decoration: underline; }
    .post-content strong { color: #fff; }
    .post-content blockquote {
      border-left: 3px solid var(--blue); padding: 0.75rem 1.25rem;
      margin: 1.5rem 0; background: rgba(14,165,233,0.07); border-radius: 0 8px 8px 0;
    }
    .post-content code {
      background: rgba(255,255,255,0.08); padding: 0.2em 0.4em;
      border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.875em;
    }

    .loading-state, .empty-state, .error-state { text-align: center; padding: 6rem 2rem; color: rgba(255,255,255,0.4); }
    .spinner {
      width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state h3 { font-size: 1.25rem; color: rgba(255,255,255,0.6); margin-bottom: 0.5rem; }
    .error-state h3 { color: rgba(255,100,100,0.7); }

    footer {
      margin-top: 6rem; border-top: 1px solid rgba(255,255,255,0.06);
      padding: 2rem; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.8rem;
    }
    footer a { color: rgba(255,255,255,0.5); }
    footer a:hover { color: #fff; }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .posts-grid, #post-view { padding: 1rem; }
      .blog-hero { padding: 3rem 1rem 2rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">LIFT<span>ORI</span></a>
  <ul class="nav-links">
    <li><a href="/#how">How It Works</a></li>
    <li><a href="/#builds">What We Build</a></li>
    <li><a href="/blog" class="active">Blog</a></li>
    <li><a href="/#waitlist" class="nav-cta">Reserve My Spot</a></li>
  </ul>
</nav>

<div id="list-view">
  <div class="blog-hero">
    <h1>The Liftori Blog</h1>
    <p>Insights, updates, and stories from the team building the future of app delivery.</p>
  </div>
  <div id="posts-container" class="posts-grid">
    <div class="loading-state"><div class="spinner"></div><p>Loading posts...</p></div>
  </div>
</div>

<div id="post-view">
  <button class="back-btn" onclick="showList()">&#8592; Back to Blog</button>
  <div id="post-detail"></div>
</div>

<footer>
  <p>&copy; 2025 Liftori, LLC. All rights reserved. &nbsp;&middot;&nbsp; <a href="/">liftori.ai</a></p>
</footer>

<script>
var SURL = 'https://qlerfkdyslndjbaltkwo.supabase.co';
var AKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXJma2R5c2xuZGpiYWx0a3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc0MTAsImV4cCI6MjA4ODczMzQxMH0.NM-bFnfWqrnelLnpYO8NNMVpwkoq4LSfCIVq6gs23qk';

function hdrs() {
  return { 'apikey': AKEY, 'Authorization': 'Bearer ' + AKEY, 'Content-Type': 'application/json' };
}

async function fetchPosts() {
  try {
    var r = await fetch(SURL + '/rest/v1/blog_posts?select=id,title,slug,excerpt,tags,author,author_role,published_at,created_at&status=eq.published&order=published_at.desc', { headers: hdrs() });
    if (!r.ok) throw new Error('Status ' + r.status);
    return await r.json();
  } catch(e) {
    console.error('fetchPosts error:', e);
    return null;
  }
}

async function fetchPost(slug) {
  try {
    var r = await fetch(SURL + '/rest/v1/blog_posts?select=*&slug=eq.' + encodeURIComponent(slug) + '&status=eq.published', { headers: hdrs() });
    if (!r.ok) throw new Error('Status ' + r.status);
    var d = await r.json();
    return d[0] || null;
  } catch(e) {
    console.error('fetchPost error:', e);
    return null;
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function renderPosts(posts) {
  var c = document.getElementById('posts-container');
  if (posts === null) {
    c.innerHTML = '<div class="error-state"><h3>Could not load posts</h3><p>Please try refreshing the page.</p></div>';
    return;
  }
  if (posts.length === 0) {
    c.innerHTML = '<div class="empty-state"><h3>No posts yet</h3><p>Check back soon &mdash; we are writing.</p></div>';
    return;
  }
  c.innerHTML = posts.map(function(p) {
    var tags = Array.isArray(p.tags) ? p.tags : [];
    var tagsHtml = tags.length ? '<div class="post-tags">' + tags.map(function(t){ return '<span class="post-tag">' + esc(t) + '</span>'; }).join('') + '</div>' : '';
    return '<div class="post-card" onclick="openPost(\'' + p.slug.replace(/'/g,"\\'") + '\')">' +
      tagsHtml +
      '<h2>' + esc(p.title) + '</h2>' +
      (p.excerpt ? '<p class="excerpt">' + esc(p.excerpt) + '</p>' : '') +
      '<div class="post-meta"><span class="author">' + esc(p.author || 'Liftori Team') + '</span><span>' + fmtDate(p.published_at || p.created_at) + '</span></div>' +
      '<br><span class="read-more">Read article &rarr;</span>' +
      '</div>';
  }).join('');
}

async function openPost(slug) {
  history.pushState({ slug: slug }, '', '/blog?post=' + encodeURIComponent(slug));
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('post-view').style.display = 'block';
  document.getElementById('post-detail').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>';
  window.scrollTo(0, 0);
  var post = await fetchPost(slug);
  if (!post) {
    document.getElementById('post-detail').innerHTML = '<p style="color:rgba(255,255,255,0.5)">Post not found.</p>';
    return;
  }
  var tags = Array.isArray(post.tags) ? post.tags : [];
  var tagsHtml = tags.length ? '<div class="post-tags" style="margin-bottom:1.5rem">' + tags.map(function(t){ return '<span class="post-tag">' + esc(t) + '</span>'; }).join('') + '</div>' : '';
  document.getElementById('post-detail').innerHTML =
    tagsHtml +
    '<h1 class="post-title">' + esc(post.title) + '</h1>' +
    '<div class="post-meta" style="margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(255,255,255,0.08)">' +
      '<span class="author">' + esc(post.author_ || 'Liftori Team') + '</span>' +
      (post.author_role ? '<span>' + esc(post.author_role) + '</span>' : '') +
      '<span>' + fmtDate(post.published_at || post.created_at) + '</span>' +
    '</div>' +
    '<div class="post-content">' + (post.content || '') + '</div>';
}

function showList() {
  history.pushState({}, '', '/blog');
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('post-view').style.display = 'none';
}

window.addEventListener('popstate', function(e) {
  var p = new URLSearchParams(window.location.search).get('post');
  if (p) { openPost(p); } else { showList(); }
});

async function init() {
  var postSlug = new URLSearchParams(window.location.search).get('post');
  var posts = await fetchPosts();
  renderPosts(posts);
  if (postSlug) await openPost(postSlug);
}

init();
</script>
</body>
</html>
