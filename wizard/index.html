<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Build Your Vision — Liftori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #060B18;
      --navy-light: #0D1526;
      --navy-border: #1E2A42;
      --blue: #0EA5E9;
      --blue-light: #38BDF8;
      --blue-glow: rgba(14,165,233,0.15);
      --white-ice: #E0F7FF;
      --text-primary: #F0F9FF;
      --text-secondary: #94A3B8;
      --text-muted: #475569;
      --success: #10B981;
      --error: #EF4444;
      --card-bg: rgba(13,21,38,0.95);
      --input-bg: rgba(30,42,66,0.6);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;min-height:100dvh}
    body{
      background:var(--navy);
      color:var(--text-primary);
      font-family:'DM Sans',system-ui,sans-serif;
      font-size:16px;
      line-height:1.6;
      overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
      background-size:60px 60px;pointer-events:none;z-index:0;
    }
    body::after{
      content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
      width:600px;height:600px;
      background:radial-gradient(circle,rgba(14,165,233,0.08) 0%,transparent 70%);
      pointer-events:none;z-index:0;
    }

    /* HEADER */
    .wiz-header{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
      background:rgba(6,11,24,0.9);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--navy-border);
    }
    .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;color:var(--blue);text-decoration:none}
    .logo span{color:var(--white-ice)}
    .step-counter{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-secondary)}
    .step-counter strong{color:var(--blue)}

    /* PROGRESS */
    .prog-wrap{position:fixed;top:57px;left:0;right:0;z-index:99;height:3px;background:var(--navy-border)}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-light));transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--blue)}

    /* LAYOUT */
    .wiz-main{
      position:relative;z-index:1;min-height:100dvh;
      padding:80px 16px 100px;
      display:flex;align-items:flex-start;justify-content:center;
    }
    .wiz-container{width:100%;max-width:640px;padding-top:40px}

    /* CARD */
    .step-card{
      background:var(--card-bg);border:1px solid var(--navy-border);border-radius:20px;
      padding:40px;backdrop-filter:blur(20px);
      box-shadow:0 8px 40px rgba(0,0,0,.4),0 0 0 1px rgba(14,165,233,.05);
      transition:opacity .2s ease,transform .2s ease;
    }
    .step-card.slide-out-fwd{opacity:0;transform:translateX(-30px)}
    .step-card.slide-out-back{opacity:0;transform:translateX(30px)}
    .step-card.slide-in-fwd{opacity:0;transform:translateX(30px)}
    .step-card.slide-in-back{opacity:0;transform:translateX(-30px)}

    /* STEP HEADER */
    .step-tag{
      display:inline-flex;align-items:center;gap:6px;
      font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;
      color:var(--blue);background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);
      border-radius:100px;padding:4px 12px;margin-bottom:16px;
    }
    .step-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.02em;line-height:1.1;color:var(--text-primary);margin-bottom:8px}
    .step-subtitle{font-size:15px;color:var(--text-secondary);margin-bottom:28px;line-height:1.5}

    /* FIELDS */
    .field-group{margin-bottom:20px}
    .field-label{display:block;font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:8px}
    .field-label .req{color:var(--blue);margin-left:3px}
    .field-helper{font-size:13px;color:var(--text-muted);margin-top:6px}

    input[type=text],input[type=email],input[type=date],input[type=password],textarea,select{
      width:100%;background:var(--input-bg);border:1px solid var(--navy-border);border-radius:12px;
      padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text-primary);
      outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
    }
    input[type=text]:focus,input[type=email]:focus,input[type=date]:focus,input[type=password]:focus,textarea:focus,select:focus{
      border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);
    }
    input::placeholder,textarea::placeholder{color:var(--text-muted)}
    textarea{resize:vertical;min-height:120px}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.5)}

    /* RADIO */
    .radio-options{display:flex;flex-direction:column;gap:10px}
    .radio-option{
      display:flex;align-items:center;gap:12px;padding:14px 16px;
      background:var(--input-bg);border:1px solid var(--navy-border);border-radius:12px;
      cursor:pointer;transition:border-color .15s,background .15s;user-select:none;
    }
    .radio-option:hover{border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.05)}
    .radio-option.selected{border-color:var(--blue);background:rgba(14,165,233,.08);box-shadow:0 0 0 1px var(--blue)}
    .radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--navy-border);flex-shrink:0;position:relative;transition:border-color .15s}
    .radio-option.selected .radio-dot{border-color:var(--blue)}
    .radio-option.selected .radio-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--blue)}
    .radio-opt-content{flex:1}
    .radio-opt-label{font-size:15px;font-weight:500;color:var(--text-primary)}
    .radio-opt-desc{font-size:13px;color:var(--text-secondary);margin-top:2px}

    /* MULTISELECT */
    .multi-options{display:flex;flex-direction:column;gap:10px}
    .check-option{
      display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
      background:var(--input-bg);border:1px solid var(--navy-border);border-radius:12px;
      cursor:pointer;transition:border-color .15s,background .15s;user-select:none;
    }
    .check-option:hover{border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.05)}
    .check-option.selected{border-color:var(--blue);background:rgba(14,165,233,.08)}
    .check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--navy-border);flex-shrink:0;position:relative;margin-top:1px;transition:border-color .15s,background .15s}
    .check-option.selected .check-box{border-color:var(--blue);background:var(--blue)}
    .check-option.selected .check-box::after{content:'';position:absolute;top:3px;left:6px;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg)}

    /* COMPOSITE */
    .composite-fields{display:flex;flex-direction:column;gap:16px}

    /* REVIEW */
    .review-sections{display:flex;flex-direction:column;gap:12px}
    .review-item{padding:16px;background:var(--input-bg);border:1px solid var(--navy-border);border-radius:12px}
    .review-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .review-item-lbl{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue)}
    .review-edit{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;font-family:'DM Sans',sans-serif;padding:2px 8px;border-radius:6px;transition:color .15s,background .15s}
    .review-edit:hover{color:var(--blue);background:var(--blue-glow)}
    .review-val{font-size:15px;color:var(--text-primary);line-height:1.5}
    .review-val.empty{color:var(--text-muted);font-style:italic}

    /* NAV */
    .wiz-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      padding:16px 24px;display:flex;gap:12px;
      background:rgba(6,11,24,.95);backdrop-filter:blur(12px);border-top:1px solid var(--navy-border);
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;
      font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;border:none;outline:none;
    }
    .btn-back{background:var(--input-bg);color:var(--text-secondary);border:1px solid var(--navy-border);min-width:100px}
    .btn-back:hover{color:var(--text-primary);border-color:var(--text-secondary)}
    .btn-next{background:var(--blue);color:white;flex:1;box-shadow:0 4px 15px rgba(14,165,233,.3)}
    .btn-next:hover{background:var(--blue-light);box-shadow:0 4px 20px rgba(14,165,233,.5);transform:translateY(-1px)}
    .btn-next:active{transform:translateY(0)}
    .btn-next:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-submit{background:linear-gradient(135deg,var(--blue),#6366F1);box-shadow:0 4px 20px rgba(14,165,233,.4)}
    .btn-submit:hover{box-shadow:0 6px 25px rgba(14,165,233,.6);transform:translateY(-1px)}

    /* ERROR */
    .err-msg{display:none;font-size:13px;color:var(--error);margin-top:10px;align-items:center;gap:6px}
    .err-msg.visible{display:flex}
    .field-error{border-color:var(--error)!important}

    /* AUTH MODAL */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;background:rgba(6,11,24,.9);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;padding:16px;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .modal-overlay.active{opacity:1;pointer-events:all}
    .modal-card{
      background:var(--card-bg);border:1px solid var(--navy-border);border-radius:20px;padding:40px;
      width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.5);
      transform:scale(.95) translateY(20px);transition:transform .25s;
    }
    .modal-overlay.active .modal-card{transform:scale(1) translateY(0)}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.02em;margin-bottom:8px}
    .modal-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:24px}
    .modal-tabs{display:flex;background:var(--input-bg);border-radius:10px;padding:4px;margin-bottom:24px}
    .modal-tab{flex:1;padding:8px;border:none;background:none;color:var(--text-secondary);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-radius:7px;transition:all .2s}
    .modal-tab.active{background:var(--blue);color:white}
    .modal-fields{display:flex;flex-direction:column;gap:14px}
    .modal-lbl{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
    .modal-err{font-size:13px;color:var(--error);text-align:center;min-height:20px}

    /* LOADING */
    .loading-screen{
      position:fixed;inset:0;z-index:300;background:var(--navy);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      transition:opacity .4s;
    }
    .loading-screen.hidden{opacity:0;pointer-events:none}
    .loading-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.05em;color:var(--blue)}
    .spinner{width:40px;height:40px;border:3px solid var(--navy-border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SUCCESS */
    .success-icon{
      width:72px;height:72px;background:rgba(16,185,129,.1);border:2px solid #10B981;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      margin:0 auto 24px;font-size:28px;
    }

    /* TOAST */
    .toast{
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--navy-light);border:1px solid var(--navy-border);border-radius:10px;
      padding:12px 20px;font-size:14px;color:var(--text-primary);z-index:500;
      opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;
    }
    .toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.error{border-color:var(--error);color:var(--error)}

    /* RESPONSIVE */
    @media(max-width:480px){
      .step-card{padding:24px 20px;border-radius:16px}
      .step-title{font-size:28px}
      .wiz-header{padding:12px 16px}
      .wiz-nav{padding:12px 16px}
      .modal-card{padding:28px 20px}
    }
    @media(min-width:641px){
      .wiz-main{align-items:center}
      .wiz-container{padding-top:0;padding-bottom:20px}
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">LIFTORI</div>
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--text-muted)">Loading your builder...</div>
</div>

<!-- Header -->
<header class="wiz-header">
  <a href="/" class="logo">LIFT<span>ORI</span></a>
  <div class="step-counter" id="stepCounter">Step <strong id="curStep">1</strong> of <strong id="totSteps">—</strong></div>
</header>

<!-- Progress Bar -->
<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

<!-- Wizard -->
<main class="wiz-main">
  <div class="wiz-container">
    <div class="step-card" id="stepCard"><!-- rendered by JS --></div>
  </div>
</main>

<!-- Nav -->
<nav class="wiz-nav" id="wizNav">
  <button class="btn btn-back" id="btnBack" onclick="goBack()">← Back</button>
  <button class="btn btn-next" id="btnNext" onclick="goNext()">Continue →</button>
</nav>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal-card">
    <div class="modal-title">Almost There!</div>
    <div class="modal-subtitle">Create an account to save your project and track its progress.</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      <button class="modal-tab" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    </div>
    <div id="authFields">
      <div class="modal-fields">
        <div id="nameRow">
          <label class="modal-lbl">Full Name</label>
          <input type="text" id="authName" placeholder="Your name">
        </div>
        <div>
          <label class="modal-lbl">Email</label>
          <input type="email" id="authEmail" placeholder="you@example.com">
        </div>
        <div>
          <label class="modal-lbl">Password</label>
          <input type="password" id="authPass" placeholder="Choose a password">
        </div>
        <div class="modal-err" id="authErr"></div>
        <button class="btn btn-next btn-submit" id="authBtn" onclick="doAuth()">Create Account & Submit</button>
      </div>
    </div>
    <div id="authOk" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:12px">✓</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:8px">Account Created!</div>
      <div style="font-size:14px;color:var(--text-secondary)">Check your email to verify your account. Your project has been submitted!</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ─────────────────────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://qlerfkdyslndjbaltkwo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXJma2R5c2xuZGpiYWx0a3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc0MTAsImV4cCI6MjA4ODczMzQxMH0.NM-bFnfWqrnelLnpYO8NNMVpwkoq4LSfCIVq6gs23qk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── STORAGE ───────────────────────────────────────────────────────────────────────────────────
const LS_KEY = 'liftori_wizard_v2';

// ── STATE ──────────────────────────────────────────────────────────────────────────────────────
let S = {
  idx: 0,
  answers: {},
  flowType: 'standard',
  steps: [],
  dynSteps: {},
  user: null,
  busy: false,
};

// ── APP TYPE → FLOW ─────────────────────────────────────────────────────────────────────────────
const FLOW_MAP = {
  'Website Builder': 'website',
  'Book Writing App': 'book',
  'CRM Builder': 'crm',
};

// ── FIXED STEPS ───────────────────────────────────────────────────────────────────────────────────
const FIXED = [
  {
    id:'vision', tag:'Your Vision', title:"What Are You Building?",
    subtitle:"Describe your idea in plain English. No tech jargon needed — just tell us what you want to create.",
    field_type:'textarea', field_key:'vision', required:true,
    placeholder:"e.g. I want a platform where local artists can sell their work directly to buyers, with profiles, a shopping cart, and order tracking...",
  },
  {
    id:'audience', tag:'Target Audience', title:"Who Is This For?",
    subtitle:"Tell us about your target users and the problem this solves for them.",
    field_type:'textarea', field_key:'target_audience', required:true,
    placeholder:"e.g. Small business owners who struggle managing appointments and need an easy way to let customers book online...",
  },
  {
    id:'app_type', tag:'App Type', title:"What Type of App?",
    subtitle:"Choose the category that best fits your project.",
    field_type:'radio', field_key:'app_type', required:true,
    options:[
      {value:'Custom Website',      label:'Custom Website',      description:'Marketing site, portfolio, landing page, or informational site'},
      {value:'E-Commerce Platform', label:'E-Commerce Platform', description:'Online store, product listings, checkout, and order management'},
      {value:'Business Dashboard',  label:'Business Dashboard',  description:'Internal tools, data visualization, and operational management'},
      {value:'Booking System',      label:'Booking System',      description:'Appointments, reservations, scheduling, and calendar management'},
      {value:'CRM Builder',         label:'CRM Builder',         description:'Customer relationship management, contacts, pipelines, follow-ups'},
      {value:'Website Builder',     label:'Website Builder',     description:'Drag-and-drop site builder for your customers or clients'},
      {value:'Book Writing App',    label:'Book Writing App',    description:'Writing, editing, organizing chapters, and publishing tools'},
      {value:'Social / Community',  label:'Social / Community',  description:'User profiles, feeds, messaging, groups, and community features'},
      {value:'AI-Powered App',      label:'AI-Powered App',      description:'Chatbots, automation, content generation, or AI-driven workflows'},
      {value:'Something Else',      label:'Something Else',      description:"A unique idea that doesn't fit the categories above"},
    ],
  },
];

// ── INIT ────────────────────────────────────────────────────────────────────────────────────────
async function init() {
  // Restore saved state
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (saved.answers) S.answers = saved.answers;
    if (saved.flowType) S.flowType = saved.flowType;
  } catch(e){}

  // Auth check
  const { data:{ session } } = await sb.auth.getSession();
  S.user = session?.user || null;

  // Load dynamic steps
  await loadDynSteps();

  // Build step list + render
  buildSteps(S.flowType);
  document.getElementById('loadingScreen').classList.add('hidden');
  renderStep(0, false);
}

// ── LOAD DYNAMIC STEPS ────────────────────────────────────────────────────────────────────────────
async function loadDynSteps() {
  try {
    const { data, error } = await sb.from('wizard_steps').select('*')
      .order('sort_order',{ascending:true})
      .order('step_number',{ascending:true});
    if (error || !data) return;
    data.forEach(row => {
      const ft = row.flow_type || 'standard';
      if (!S.dynSteps[ft]) S.dynSteps[ft] = [];
      S.dynSteps[ft].push(row);
    });
  } catch(e){ console.warn('wizard_steps unavailable:', e.message); }
}

// ── BUILD STEP LIST ───────────────────────────────────────────────────────────────────────────────────
function buildSteps(flow) {
  const dyn = (S.dynSteps[flow] || []).filter(s => s.field_type !== 'review');
  S.steps = [
    ...FIXED,
    ...dyn,
    {
      id:'review', tag:'Final Review', title:'Review Your Project',
      subtitle:'Everything look good? Edit any section before we submit.',
      field_type:'review', field_key:'_review', required:false,
    },
  ];
  updateNav();
}

// ── UPDATE PROGRESS + NAV ─────────────────────────────────────────────────────────────────────────────
function updateNav() {
  const total = S.steps.length;
  const cur = S.idx + 1;
  const pct = Math.round((S.idx / Math.max(total - 1, 1)) * 100);

  document.getElementById('curStep').textContent = cur;
  document.getElementById('totSteps').textContent = total;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('btnBack').style.display = S.idx === 0 ? 'none' : '';

  const isLast = S.idx === S.steps.length - 1;
  const btn = document.getElementById('btnNext');
  btn.textContent = isLast ? 'Submit Project →' : 'Continue →';
  btn.className = 'btn btn-next' + (isLast ? ' btn-submit' : '');
}

// ── RENDER STEP ───────────────────────────────────────────────────────────────────────────────────────
function renderStep(idx, dir) {
  // dir: false = no animation, 'fwd', 'back'
  S.idx = idx;
  const step = S.steps[idx];
  const card = document.getElementById('stepCard');

  const doRender = () => {
    card.innerHTML = buildStepHTML(step);
    attachListeners(step);
    updateNav();
    window.scrollTo({top:0,behavior:'smooth'});
    if (dir) {
      card.classList.add('slide-in-' + dir);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => card.classList.remove('slide-in-fwd','slide-in-back'));
      });
    }
  };

  if (dir) {
    card.classList.add('slide-out-' + (dir === 'fwd' ? 'fwd' : 'back'));
    setTimeout(() => {
      card.classList.remove('slide-out-fwd','slide-out-back');
      doRender();
    }, 180);
  } else {
    doRender();
  }
}

// ── BUILD STEP HTML ───────────────────────────────────────────────────────────────────────────────────
function buildStepHTML(step) {
  const answer = S.answers[step.field_key];
  let fieldHTML = '';

  switch(step.field_type) {
    case 'text':
      fieldHTML = `<div class="field-group">
        <input type="text" id="f_${esc(step.field_key)}" placeholder="${ea(step.placeholder||'')}" value="${ea(answer||'')}">
        ${step.helper ? `<div class="field-helper">${esc(step.helper)}</div>` : ''}
      </div>`;
      break;
    case 'textarea':
      fieldHTML = `<div class="field-group">
        <textarea id="f_${esc(step.field_key)}" placeholder="${ea(step.placeholder||'')}" rows="5">${esc(answer||'')}</textarea>
        ${step.helper ? `<div class="field-helper">${esc(step.helper)}</div>` : ''}
      </div>`;
      break;
    case 'radio':
      fieldHTML = buildRadioHTML(step, answer);
      break;
    case 'multiselect':
      fieldHTML = buildMultiHTML(step, answer);
      break;
    case 'composite':
      fieldHTML = buildCompositeHTML(step, answer);
      break;
    case 'date':
      fieldHTML = `<div class="field-group">
        <input type="date" id="f_${esc(step.field_key)}" value="${ea(answer||'')}">
        ${step.helper ? `<div class="field-helper">${esc(step.helper)}</div>` : ''}
      </div>`;
      break;
    case 'review':
      fieldHTML = buildReviewHTML();
      break;
    default:
      fieldHTML = `<div class="field-group"><input type="text" id="f_${esc(step.field_key)}" value="${ea(answer||'')}"></div>`;
  }

  return `
    <div class="step-tag">${esc(step.tag||`Step ${S.idx+1}`)}</div>
    <h1 class="step-title">${esc(step.title)}</h1>
    ${step.subtitle ? `<p class="step-subtitle">${esc(step.subtitle)}</p>` : ''}
    ${fieldHTML}
    <div class="err-msg" id="stepErr"><span>⚠</span><span id="stepErrTxt">Please complete this field to continue.</span></div>
  `;
}

function buildRadioHTML(step, answer) {
  const opts = normOpts(step.options);
  return `<div class="radio-options" id="f_${esc(step.field_key)}">${opts.map(o => `
    <div class="radio-option${answer===o.value?' selected':''}" data-value="${ea(o.value)}"
         onclick="pickRadio('${esc(step.field_key)}','${ea(o.value)}',this)">
      <div class="radio-dot"></div>
      <div class="radio-opt-content">
        <div class="radio-opt-label">${esc(o.label||o.value)}</div>
        ${o.description?`<div class="radio-opt-desc">${esc(o.description)}</div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

function buildMultiHTML(step, answer) {
  const opts = normOpts(step.options);
  const sel = Array.isArray(answer) ? answer : [];
  return `<div class="multi-options" id="f_${esc(step.field_key)}">${opts.map(o => `
    <div class="check-option${sel.includes(o.value)?' selected':''}" data-value="${ea(o.value)}"
         onclick="toggleCheck('${esc(step.field_key)}','${ea(o.value)}',this)">
      <div class="check-box"></div>
      <div class="radio-opt-content">
        <div class="radio-opt-label">${esc(o.label||o.value)}</div>
        ${o.description?`<div class="radio-opt-desc">${esc(o.description)}</div>`:''}
      </div>
    </div>`).join('')}
  </div>${step.helper?`<div class="field-helper" style="margin-top:10px">${esc(step.helper)}</div>`:''}`;
}

function buildCompositeHTML(step, answer) {
  const subs = parseComposite(step.options);
  const aObj = (answer && typeof answer==='object') ? answer : {};
  return `<div class="composite-fields" id="comp_${esc(step.field_key)}">${subs.map(sf => {
    const val = aObj[sf.key] || '';
    const req = sf.required ? '<span class="req">*</span>' : '';
    let inp = sf.type==='textarea'
      ? `<textarea id="c_${esc(step.field_key)}_${esc(sf.key)}" placeholder="${ea(sf.helper)}" rows="3">${esc(val)}</textarea>`
      : sf.type==='date'
      ? `<input type="date" id="c_${esc(step.field_key)}_${esc(sf.key)}" value="${ea(val)}">`
      : `<input type="text" id="c_${esc(step.field_key)}_${esc(sf.key)}" placeholder="${ea(sf.helper)}" value="${ea(val)}">`;
    return `<div class="field-group"><label class="field-label">${esc(sf.label)}${req}</label>${inp}</div>`;
  }).join('')}</div>`;
}

function buildReviewHTML() {
  const items = S.steps
    .filter(s => s.field_type !== 'review')
    .map((s, i) => {
      const val = S.answers[s.field_key];
      const display = fmtAnswer(val, s);
      return `<div class="review-item">
        <div class="review-item-hdr">
          <div class="review-item-lbl">${esc(s.tag||s.title)}</div>
          <button class="review-edit" onclick="jumpTo(${i})">Edit</button>
        </div>
        <div class="review-val${!display?' empty':''}">${display||'Not answered'}</div>
      </div>`;
    });
  return `<div class="review-sections">${items.join('')}</div>`;
}

function fmtAnswer(val) {
  if (val === undefined || val === null || val === '') return '';
  if (Array.isArray(val)) return esc(val.join(', '));
  if (typeof val === 'object') {
    return Object.entries(val).filter(([,v])=>v)
      .map(([k,v]) => `<strong>${esc(k.replace(/_/g,' '))}:</strong> ${esc(String(v))}`).join('<br>');
  }
  return esc(String(val));
}

// ── ATTACH LISTENERS ───────────────────────────────────────────────────────────────────────────────────
function attachListeners(step) {
  const clearErr = () => hideErr();
  if (['text','textarea','date'].includes(step.field_type)) {
    const el = document.getElementById(`f_${step.field_key}`);
    if (el) {
      el.addEventListener('input', () => { save(step.field_key, el.value); clearErr(); });
      if (step.field_type === 'text') el.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();goNext();} });
    }
  } else if (step.field_type === 'composite') {
    parseComposite(step.options).forEach(sf => {
      const el = document.getElementById(`c_${step.field_key}_${sf.key}`);
      if (el) el.addEventListener('input', () => { saveComp(step.field_key, sf.key, el.value); clearErr(); });
    });
  }
}

// ── INTERACTION ───────────────────────────────────────────────────────────────────────────────────────
function pickRadio(key, val, el) {
  el.closest('.radio-options').querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  save(key, val);
  hideErr();
  if (key === 'app_type') {
    const flow = FLOW_MAP[val] || 'standard';
    if (flow !== S.flowType) { S.flowType = flow; buildSteps(flow); persist(); }
  }
}

function toggleCheck(key, val, el) {
  el.classList.toggle('selected');
  const selected = [...el.closest('.multi-options').querySelectorAll('.check-option.selected')].map(o => o.dataset.value);
  save(key, selected);
  hideErr();
}

function save(key, val) { S.answers[key] = val; persist(); }
function saveComp(key, sub, val) {
  if (!S.answers[key] || typeof S.answers[key] !== 'object') S.answers[key] = {};
  S.answers[key][sub] = val;
  persist();
}
function persist() { localStorage.setItem(LS_KEY, JSON.stringify({answers:S.answers,flowType:S.flowType})); }

// ── FLUSH current text/date/composite values before navigating ─────────────────
function flush(step) {
  if (!step) return;
  if (['text','textarea','date'].includes(step.field_type)) {
    const el = document.getElementById(`f_${step.field_key}`);
    if (el) save(step.field_key, el.value);
  } else if (step.field_type === 'composite') {
    parseComposite(step.options).forEach(sf => {
      const el = document.getElementById(`c_${step.field_key}_${sf.key}`);
      if (el) saveComp(step.field_key, sf.key, el.value);
    });
  }
}

// ── NAVIGATE ────────────────────────────────────────────────────────────────────────────────────────────
function goNext() {
  const step = S.steps[S.idx];
  flush(step);
  if (!validate(step)) return;
  if (S.idx === S.steps.length - 1) { handleSubmit(); return; }
  renderStep(S.idx + 1, 'fwd');
}

function goBack() {
  if (S.idx === 0) return;
  flush(S.steps[S.idx]);
  renderStep(S.idx - 1, 'back');
}

function jumpTo(idx) {
  flush(S.steps[S.idx]);
  renderStep(idx, 'back');
}

// ── VALIDATE ────────────────────────────────────────────────────────────────────────────────────────────
function validate(step) {
  if (step.field_type === 'review') return true;
  if (!step.required) return true;

  if (['text','textarea','date'].includes(step.field_type)) {
    const el = document.getElementById(`f_${step.field_key}`);
    const val = el ? el.value.trim() : (S.answers[step.field_key] || '');
    if (!val) { showErr('Please fill in this field before continuing.'); el?.classList.add('field-error'); el?.focus(); return false; }
  } else if (step.field_type === 'radio') {
    if (!S.answers[step.field_key]) { showErr('Please select an option before continuing.'); return false; }
  } else if (step.field_type === 'multiselect') {
    const ans = S.answers[step.field_key];
    if (!ans || !ans.length) { showErr('Please select at least one option.'); return false; }
  } else if (step.field_type === 'composite') {
    for (const sf of parseComposite(step.options)) {
      if (sf.required) {
        const el = document.getElementById(`c_${step.field_key}_${sf.key}`);
        const val = el ? el.value.trim() : '';
        if (!val) { showErr(`Please fill in "${sf.label}" to continue.`); el?.classList.add('field-error'); el?.focus(); return false; }
      }
    }
  }
  return true;
}

function showErr(msg) {
  const e = document.getElementById('stepErr');
  document.getElementById('stepErrTxt').textContent = msg;
  if (e) e.classList.add('visible');
}
function hideErr() {
  const e = document.getElementById('stepErr');
  if (e) e.classList.remove('visible');
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────────────────────────────
async function handleSubmit() {
  if (S.busy) return;
  S.busy = true;
  const { data:{ session } } = await sb.auth.getSession();
  S.user = session?.user || null;
  if (!S.user) { document.getElementById('authModal').classList.add('active'); S.busy = false; return; }
  await doSubmit(S.user);
}

async function doSubmit(user) {
  try {
    const stepData = {};
    S.steps.forEach(s => { if (s.field_type !== 'review' && S.answers[s.field_key] !== undefined) stepData[s.field_key] = S.answers[s.field_key]; });
    stepData._flow_type = S.flowType;

    const { error } = await sb.from('wizard_submissions').insert({
      customer_id: user.id,
      step_data: stepData,
      completed: true,
      submitted_at: new Date().toISOString(),
    });
    if (error) throw error;

    localStorage.removeItem(LS_KEY);
    showSuccess();
  } catch(err) {
    console.error(err);
    toast('Something went wrong. Please try again.', 'error');
    S.busy = false;
  }
}

function showSuccess() {
  document.getElementById('wizNav').style.display = 'none';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('curStep').innerHTML = '<span style="color:var(--success)">✓</span>';
  document.getElementById('stepCard').innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div class="success-icon">✓</div>
      <h1 class="step-title">Project Submitted!</h1>
      <p class="step-subtitle" style="margin-bottom:28px">We've received your project brief. Our team will review it and be in touch within 24 hours.</p>
      <div style="padding:20px;background:var(--input-bg);border:1px solid var(--navy-border);border-radius:12px;text-align:left;margin-bottom:28px">
        <div style="font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:12px">What Happens Next</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${['Our AI generates your full project brief','You receive design mockups to approve','Build begins — tracked in your dashboard','Your product goes live'].map((t,i)=>`
          <div style="display:flex;gap:10px;font-size:14px;color:var(--text-secondary)"><span style="color:var(--blue);font-family:'DM Mono',monospace;font-size:12px;min-width:24px">0${i+1}</span>${esc(t)}</div>`).join('')}
        </div>
      </div>
      <a href="/" class="btn btn-next" style="text-decoration:none;display:inline-flex">Back to Liftori →</a>
    </div>`;
}

// ── AUTH MODAL ────────────────────────────────────────────────────────────────────────────────────────
let authMode = 'signup';
function switchTab(mode) {
  authMode = mode;
  document.getElementById('tabSignup').classList.toggle('active', mode==='signup');
  document.getElementById('tabLogin').classList.toggle('active', mode==='login');
  document.getElementById('nameRow').style.display = mode==='signup' ? '' : 'none';
  document.getElementById('authBtn').textContent = mode==='signup' ? 'Create Account & Submit' : 'Sign In & Submit';
  document.getElementById('authErr').textContent = '';
}

async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const name  = document.getElementById('authName').value.trim();
  const errEl = document.getElementById('authErr');
  if (!email || !pass) { errEl.textContent = 'Email and password are required.'; return; }

  const btn = document.getElementById('authBtn');
  btn.textContent = 'Processing...'; btn.disabled = true; errEl.textContent = '';

  try {
    let user;
    if (authMode === 'signup') {
      const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ full_name:name } } });
      if (error) throw error;
      user = data.user;
      document.getElementById('authFields').style.display = 'none';
      document.getElementById('authOk').style.display = 'block';
      setTimeout(async () => { document.getElementById('authModal').classList.remove('active'); await doSubmit(user); }, 1800);
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password:pass });
      if (error) throw error;
      user = data.user;
      document.getElementById('authModal').classList.remove('active');
      await doSubmit(user);
    }
  } catch(err) {
    errEl.textContent = err.message || 'Authentication failed.';
    btn.textContent = authMode==='signup' ? 'Create Account & Submit' : 'Sign In & Submit';
    btn.disabled = false;
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast visible' + (type ? ' '+type : '');
  setTimeout(() => el.className = 'toast', 3500);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────────────────────────────────
function normOpts(opts) {
  if (!opts) return [];
  if (typeof opts === 'string') { try { opts = JSON.parse(opts); } catch{ return []; } }
  if (!Array.isArray(opts)) return [];
  return opts.map(o => typeof o === 'string' ? {value:o,label:o} : o);
}

// Parse "Label (type, required/optional) — helper text"
function parseComposite(opts) {
  return normOpts(opts).map(o => {
    const raw = typeof o === 'string' ? o : (o.value || o.label || '');
    const m = raw.match(/^(.+?)\s*\((\w+),\s*(required|optional)\)\s*(?:[—–-]\s*(.+))?$/);
    if (m) {
      const label = m[1].trim();
      return { label, key: label.toLowerCase().replace(/[^a-z0-9]+/g,'_'), type:m[2].toLowerCase(), required:m[3]==='required', helper:m[4]||'' };
    }
    const label = raw.replace(/[()]/g,'').trim() || 'Field';
    return { label, key:label.toLowerCase().replace(/[^a-z0-9]+/g,'_'), type:'text', required:false, helper:'' };
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function ea(s) {
  if (!s) return '';
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── KEYBOARD ────────────────────────────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('authModal').classList.remove('active'); });

// ── START ────────────────────────────────────────────────────────────────────────────────────────────
init();
</script>
