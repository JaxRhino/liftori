<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liftori Admin &mdash; Waitlist Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060B18;
            color: #E0F7FF;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(14, 165, 233, 0.04);
            border: 1px solid rgba(14, 165, 233, 0.15);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 4px;
            color: #E0F7FF;
            margin-bottom: 4px;
        }

        .login-box .subtitle {
            font-size: 13px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 32px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .login-field {
            width: 100%;
            margin-bottom: 16px;
        }

        .login-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 6px;
            text-align: left;
        }

        .login-field input {
            width: 100%;
            background: rgba(6, 11, 24, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: #E0F7FF;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-field input:focus {
            border-color: #0EA5E9;
        }

        .login-field input::placeholder {
            color: rgba(224, 247, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            background: #0EA5E9;
            border: none;
            border-radius: 8px;
            padding: 14px;
            color: #060B18;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #38bdf8;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        /* ===== DASHBOARD (hidden until login) ===== */
        .dashboard { display: none; }

        /* Top nav */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.15);
            background: rgba(6, 11, 24, 0.95);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-brand h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: #E0F7FF;
        }

        .nav-brand span {
            font-size: 12px;
            font-weight: 500;
            color: #0EA5E9;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-right .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: rgba(224, 247, 255, 0.5);
        }

        .nav-user {
            font-size: 13px;
            color: rgba(224, 247, 255, 0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .btn-refresh, .btn-logout {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #0EA5E9;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh:hover, .btn-logout:hover {
            background: rgba(14, 165, 233, 0.2);
            border-color: #0EA5E9;
        }

        .btn-logout {
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.08);
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(14, 165, 233, 0.05);
            border: 1px solid rgba(14, 165, 233, 0.12);
            border-radius: 10px;
            padding: 20px 24px;
            flex: 1;
            min-width: 180px;
            max-width: 220px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            color: #0EA5E9;
            line-height: 1;
        }

        .stat-card .sub {
            font-size: 12px;
            color: rgba(224, 247, 255, 0.3);
            margin-top: 4px;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 24px;
            padding: 0 32px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.08);
            background: rgba(6, 11, 24, 0.4);
        }

        .tab-btn {
            background: none;
            border: none;
            color: rgba(224, 247, 255, 0.4);
            padding: 16px 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            color: #E0F7FF;
        }

        .tab-btn.active {
            color: #0EA5E9;
            border-bottom-color: #0EA5E9;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Main content */
        .main {
            padding: 24px 32px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: #E0F7FF;
        }

        .export-btn, .add-affiliate-btn {
            background: transparent;
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #7DD3FC;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .export-btn:hover, .add-affiliate-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: #0EA5E9;
        }

        /* Table */
        .table-wrap {
            background: rgba(14, 165, 233, 0.03);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(14, 165, 233, 0.08);
        }

        th {
            text-align: left;
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            border-bottom: 1px solid rgba(14, 165, 233, 0.1);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.06);
            color: #E0F7FF;
        }

        tr:hover td {
            background: rgba(14, 165, 233, 0.04);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .email-cell { color: #7DD3FC; }

        .idea-cell {
            max-width: 200px;
            color: rgba(224, 247, 255, 0.7);
            font-size: 13px;
            line-height: 1.5;
        }
        .details-btn:hover { background: #0284C7 !important; }
        .compact-cell { font-size: 13px; white-space: nowrap; color: rgba(224, 247, 255, 0.7); }

        .idea-cell.empty {
            color: rgba(224, 247, 255, 0.2);
            font-style: italic;
        }

        .date-cell {
            color: rgba(224, 247, 255, 0.4);
            font-size: 13px;
            white-space: nowrap;
        }

        .row-num {
            color: rgba(224, 247, 255, 0.2);
            font-size: 13px;
            font-weight: 500;
        }

        .referred-cell {
            color: rgba(224, 247, 255, 0.6);
            font-size: 13px;
        }

        .referred-cell.organic {
            color: rgba(224, 247, 255, 0.3);
        }

        /* Affiliate Stats Row */
        .affiliate-stats-row {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .affiliate-stat-card {
            background: rgba(14, 165, 233, 0.05);
            border: 1px solid rgba(14, 165, 233, 0.12);
            border-radius: 10px;
            padding: 20px 24px;
            flex: 1;
            min-width: 180px;
            max-width: 220px;
        }

        .affiliate-stat-card .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 8px;
        }

        .affiliate-stat-card .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: #0EA5E9;
            line-height: 1;
        }

        /* Add Affiliate Form */
        .add-affiliate-form {
            display: none;
            background: rgba(14, 165, 233, 0.03);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .add-affiliate-form.open {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            background: rgba(6, 11, 24, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 6px;
            padding: 10px 12px;
            color: #E0F7FF;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #0EA5E9;
        }

        .form-group input::placeholder {
            color: rgba(224, 247, 255, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        .form-actions button {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save-affiliate {
            background: #0EA5E9;
            color: #060B18;
        }

        .btn-save-affiliate:hover {
            background: #38bdf8;
        }

        .btn-cancel-form {
            background: rgba(14, 165, 233, 0.1);
            color: #7DD3FC;
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .btn-cancel-form:hover {
            background: rgba(14, 165, 233, 0.2);
        }

        /* Affiliate Actions */
        .affiliate-actions {
            display: flex;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-action {
            background: transparent;
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #7DD3FC;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: #0EA5E9;
        }

        .btn-action.danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #fca5a5;
        }

        /* Copy Link Button */
        .copy-link-btn {
            background: transparent;
            border: 1px solid rgba(14, 165, 233, 0.2);
            color: #7DD3FC;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .copy-link-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: #0EA5E9;
        }

        .copy-feedback {
            display: inline-block;
            font-size: 11px;
            color: #7DD3FC;
            margin-left: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        /* Status Toggle */
        .status-toggle {
            display: inline-block;
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .status-toggle input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(14, 165, 233, 0.2);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 12px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 2px;
            background: #E0F7FF;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .toggle-slider {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(224, 247, 255, 0.3);
        }

        .empty-state h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: rgba(224, 247, 255, 0.2);
            margin-bottom: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #0EA5E9;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-top-color: #0EA5E9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .stats-bar { padding: 16px; gap: 12px; }
            .stat-card { min-width: 140px; }
            .main { padding: 16px; }
            .table-wrap { overflow-x: auto; }
            table { min-width: 600px; }
            .login-box { padding: 32px 24px; }
            .tab-nav { padding: 0 16px; gap: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            .affiliate-stats-row { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h1>LIFTORI</h1>
            <div class="subtitle">Admin Dashboard</div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="login-field">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="admin@liftori.ai" required autocomplete="email">
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <!-- ===== DASHBOARD (hidden until authenticated) ===== -->
    <div class="dashboard" id="dashboard">
        <nav class="nav">
            <div class="nav-brand">
                <h1>LIFTORI</h1>
                <span>Admin</span>
            </div>
            <div class="nav-right">
                <div class="status">
                    <div class="status-dot"></div>
                    <span>Connected</span>
                </div>
                <span class="nav-user" id="nav-user"></span>
                <button class="btn-refresh" onclick="loadData()">Refresh</button>
                <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
            </div>
        </nav>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="label">Total Signups</div>
                <div class="value" id="stat-total">&mdash;</div>
                <div class="sub">all time</div>
            </div>
            <div class="stat-card">
                <div class="label">With Ideas</div>
                <div class="value" id="stat-ideas">&mdash;</div>
                <div class="sub">submitted a build idea</div>
            </div>
            <div class="stat-card">
                <div class="label">Today</div>
                <div class="value" id="stat-today">&mdash;</div>
                <div class="sub" id="stat-today-date"></div>
            </div>
            <div class="stat-card">
                <div class="label">Referred</div>
                <div class="value" id="stat-referred">&mdash;</div>
                <div class="sub">via affiliate links</div>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="waitlist" onclick="switchTab('waitlist')">Waitlist</button>
            <button class="tab-btn" data-tab="affiliates" onclick="switchTab('affiliates')">Affiliates</button>
        </div>

        <div class="main">
            <!-- ===== WAITLIST TAB ===== -->
            <div class="tab-content active" id="tab-waitlist">
                <div class="section-header">
                    <h2>Waitlist Signups</h2>
                    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
                </div>
                <div id="error-container-waitlist"></div>
                <div class="table-wrap">
                    <div id="waitlist-table-content">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading waitlist data...
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== AFFILIATES TAB ===== -->
            <div class="tab-content" id="tab-affiliates">
                <div class="section-header">
                    <h2>Affiliates</h2>
                    <button class="add-affiliate-btn" onclick="toggleAddAffiliateForm()">Add Affiliate</button>
                </div>

                <div id="error-container-affiliates"></div>

                <!-- Affiliate Stats -->
                <div class="affiliate-stats-row">
                    <div class="affiliate-stat-card">
                        <div class="label">Total Affiliates</div>
                        <div class="value" id="stat-total-affiliates">0</div>
                    </div>
                    <div class="affiliate-stat-card">
                        <div class="label">Total Referrals</div>
                        <div class="value" id="stat-total-referrals">0</div>
                    </div>
                    <div class="affiliate-stat-card">
                        <div class="label">Top Affiliate</div>
                        <div class="value" id="stat-top-affiliate" style="font-size: 18px; margin-top: 8px;">—</div>
                    </div>
                </div>

                <!-- Add Affiliate Form -->
                <div class="add-affiliate-form" id="add-affiliate-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="form-affiliate-name" placeholder="Affiliate name" required>
                        </div>
                        <div class="form-group">
                            <label>Email (optional)</label>
                            <input type="email" id="form-affiliate-email" placeholder="affiliate@example.com">
                        </div>
                        <div class="form-group">
                            <label>Referral Code</label>
                            <input type="text" id="form-affiliate-code" placeholder="auto-generated" readonly>
                        </div>
                        <div class="form-group">
                            <label>Commission Rate ($)</label>
                            <input type="number" id="form-affiliate-rate" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Commission Type</label>
                            <select id="form-affiliate-type" required>
                                <option value="per_signup">Per Signup</option>
                                <option value="percentage">Percentage (%)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-save-affiliate" onclick="saveAffiliate()">Save Affiliate</button>
                        <button class="btn-cancel-form" onclick="toggleAddAffiliateForm()">Cancel</button>
                    </div>
                </div>

                <!-- Affiliates Table -->
                <div class="table-wrap">
                    <div id="affiliates-table-content">
                        <div class="loading">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qlerfkdyslndjbaltkwo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXJma2R5c2xuZGpiYWx0a3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc0MTAsImV4cCI6MjA4ODczMzQxMH0.NM-bFnfWqrnelLnpYO8NNMVpwkoq4LSfCIVq6gs23qk';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allWaitlistData = [];

        // ===== AUTH FUNCTIONS =====
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                showDashboard(session.user);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.style.display = 'none';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            showDashboard(data.user);
        }

        async function handleLogout() {
            await sb.auth.signOut();
            if (refreshInterval) clearInterval(refreshInterval);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('login-password').value = '';
        }

        function showDashboard(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('nav-user').textContent = user.email;
            loadData();
            refreshInterval = setInterval(loadData, 30000);
        }

        // ===== TAB FUNCTIONS =====
        function switchTab(tabName) {
            currentTab = tabName;

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Reset form if switching away from affiliates
            if (tabName !== 'affiliates') {
                closeAddAffiliateForm();
            }
        }

        // ===== AFFILIATE FORM FUNCTIONS =====
        function toggleAddAffiliateForm() {
            const form = document.getElementById('add-affiliate-form');
            form.classList.toggle('open');
            if (form.classList.contains('open')) {
                resetAffiliateForm();
            }
        }

        function closeAddAffiliateForm() {
            document.getElementById('add-affiliate-form').classList.remove('open');
            resetAffiliateForm();
        }

        function resetAffiliateForm() {
            document.getElementById('form-affiliate-name').value = '';
            document.getElementById('form-affiliate-email').value = '';
            document.getElementById('form-affiliate-code').value = '';
            document.getElementById('form-affiliate-rate').value = '';
            document.getElementById('form-affiliate-type').value = 'per_signup';
            editingAffiliateId = null;
        }

        function generateReferralCode(name) {
            return name
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, '-')
                .slice(0, 30);
        }

        document.addEventListener('input', function(e) {
            if (e.target.id === 'form-affiliate-name') {
                const code = generateReferralCode(e.target.value);
                document.getElementById('form-affiliate-code').value = code;
            }
        });

        async function saveAffiliate() {
            const name = document.getElementById('form-affiliate-name').value.trim();
            const email = document.getElementById('form-affiliate-email').value.trim() || null;
            const code = document.getElementById('form-affiliate-code').value.trim();
            const rate = parseFloat(document.getElementById('form-affiliate-rate').value);
            const type = document.getElementById('form-affiliate-type').value;

            if (!name || !code || isNaN(rate)) {
                alert('Please fill in all required fields.');
                return;
            }

            try {
                if (editingAffiliateId) {
                    // Update existing
                    const { error } = await sb
                        .from('affiliates')
                        .update({
                            name,
                            email,
                            referral_code: code,
                            commission_rate: rate,
                            commission_type: type
                        })
                        .eq('id', editingAffiliateId);

                    if (error) throw error;
                } else {
                    // Create new
                    const { error } = await sb
                        .from('affiliates')
                        .insert({
                            name,
                            email,
                            referral_code: code,
                            commission_rate: rate,
                            commission_type: type,
                            is_active: true
                        });

                    if (error) throw error;
                }

                closeAddAffiliateForm();
                loadData();
            } catch (err) {
                alert(`Error saving affiliate: ${err.message}`);
            }
        }

        function editAffiliate(id) {
            const affiliate = allAffiliatesData.find(a => a.id === id);
            if (!affiliate) return;

            editingAffiliateId = id;
            document.getElementById('form-affiliate-name').value = affiliate.name;
            document.getElementById('form-affiliate-email').value = affiliate.email || '';
            document.getElementById('form-affiliate-code').value = affiliate.referral_code;
            document.getElementById('form-affiliate-rate').value = affiliate.commission_rate;
            document.getElementById('form-affiliate-type').value = affiliate.commission_type;
            document.getElementById('add-affiliate-form').classList.add('open');
        }

        async function deleteAffiliate(id) {
            if (!confirm('Are you sure you want to delete this affiliate?')) return;

            try {
                const { error } = await sb
                    .from('affiliates')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                loadData();
            } catch (err) {
                alert(`Error deleting affiliate: ${err.message}`);
            }
        }

        async function toggleAffiliateStatus(id, currentStatus) {
            try {
                const { error } = await sb
                    .from('affiliates')
                    .update({ is_active: !currentStatus })
                    .eq('id', id);

                if (error) throw error;
                loadData();
            } catch (err) {
                alert(`Error updating status: ${err.message}`);
            }
        }

        function copyAffiliateLink(code) {
            const link = `https://liftori.ai?ref=${code}`;
            navigator.clipboard.writeText(link).then(() => {
                const feedback = event.target.nextElementSibling;
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        // ===== DATA FUNCTIONS =====
        async function loadData() {
            const errorWaitlist = document.getElementById('error-container-waitlist');
            const errorAffiliates = document.getElementById('error-container-affiliates');
            errorWaitlist.innerHTML = '';
            errorAffiliates.innerHTML = '';

            try {
                // Load waitlist signups
                const { data: waitlistData, error: waitlistError } = await sb
                    .from('waitlist_signups')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (waitlistError) throw waitlistError;
                allWaitlistData = waitlistData || [];

                // Load affiliates
                const { data: affiliatesData, error: affiliatesError } = await sb
                    .from('affiliates')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (affiliatesError) throw affiliatesError;
                allAffiliatesData = affiliatesData || [];

                renderStats();
                renderWaitlistTable();
                renderAffiliatesTable();
            } catch (err) {
                const msg = `Failed to load data: ${err.message}`;
                errorWaitlist.innerHTML = `<div class="error-msg">${msg}</div>`;
                errorAffiliates.innerHTML = `<div class="error-msg">${msg}</div>`;
            }
        }

        function renderStats() {
            // Waitlist stats
            document.getElementById('stat-total').textContent = allWaitlistData.length;
            document.getElementById('stat-ideas').textContent = allWaitlistData.filter(r => r.build_idea && r.build_idea.trim()).length;

            const today = new Date().toISOString().split('T')[0];
            const todayCount = allWaitlistData.filter(r => r.created_at && r.created_at.startsWith(today)).length;
            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-today-date').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            // Referral stats
            const referredCount = allWaitlistData.filter(r => r.referral_code && r.referral_code.trim()).length;
            document.getElementById('stat-referred').textContent = referredCount;

            // Affiliate stats
            document.getElementById('stat-total-affiliates').textContent = allAffiliatesData.length;

            let totalReferrals = 0;
            let topAffiliateName = '—';
            let maxReferrals = 0;

            allAffiliatesData.forEach(affiliate => {
                const referralCount = allWaitlistData.filter(r => r.referral_code === affiliate.referral_code).length;
                totalReferrals += referralCount;
                if (referralCount > maxReferrals) {
                    maxReferrals = referralCount;
                    topAffiliateName = affiliate.name;
                }
            });

            document.getElementById('stat-total-referrals').textContent = totalReferrals;
            document.getElementById('stat-top-affiliate').textContent = topAffiliateName;
        }

        
            // ── Label Mapping Functions ──
            function formatAppType(val) {
                const map = { saas: 'SaaS', mobile_app: 'Mobile App', ecommerce: 'E-Commerce', marketplace: 'Marketplace', social: 'Social', content: 'Content', other: 'Other' };
                return map[val] || val || '-';
            }
            function formatBudget(val) {
                const map = { under_5k: '<$5K', '5k_15k': '$5-15K', '15k_50k': '$15-50K', '50k_plus': '$50K+', not_sure: 'TBD' };
                return map[val] || val || '-';
            }
            function formatTimeline(val) {
                const map = { asap: 'ASAP', '1_3_months': '1-3 Mo', '3_6_months': '3-6 Mo', '6_plus_months': '6+ Mo', flexible: 'Flexible' };
                return map[val] || val || '-';
            }
            function formatDesignStyle(val) {
                const map = { modern_clean: 'Modern/Clean', bold_vibrant: 'Bold/Vibrant', minimal: 'Minimal', corporate: 'Corporate', playful: 'Playful', no_preference: 'No Pref' };
                return map[val] || val || '-';
            }

            // ── Details Modal ──
            function showDetails(rowId) {
                const row = allWaitlistData.find(r => r.id === rowId);
                if (!row) return;
                const modal = document.getElementById('detailsModal');
                if (modal) modal.remove();
                const div = document.createElement('div');
                div.id = 'detailsModal';
                div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;';
                div.innerHTML = `
                    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;color:#e2e8f0;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                            <h3 style="margin:0;color:#7DD3FC;font-size:18px;">${escapeHtml(row.full_name || row.name || 'Unknown')}</h3>
                            <button onclick="document.getElementById('detailsModal').remove()" style="background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;">&times;</button>
                        </div>
                        <div style="display:grid;gap:12px;">
                            <div><span style="color:#94a3b8;font-size:12px;">EMAIL</span><br/>${escapeHtml(row.email)}</div>
                            <div><span style="color:#94a3b8;font-size:12px;">APP TYPE</span><br/>${formatAppType(row.app_type)}</div>
                            <div><span style="color:#94a3b8;font-size:12px;">BUILD IDEA</span><br/>${escapeHtml(row.build_idea || '-')}</div>
                            <div><span style="color:#94a3b8;font-size:12px;">TARGET AUDIENCE</span><br/>${escapeHtml(row.target_audience || '-')}</div>
                            <div><span style="color:#94a3b8;font-size:12px;">KEY FEATURES</span><br/>${escapeHtml(row.key_features || '-')}</div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div><span style="color:#94a3b8;font-size:12px;">DESIGN STYLE</span><br/>${formatDesignStyle(row.design_style)}</div>
                                <div><span style="color:#94a3b8;font-size:12px;">COLOR PREF</span><br/>${escapeHtml(row.color_preference || '-')}</div>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div><span style="color:#94a3b8;font-size:12px;">BUDGET</span><br/>${formatBudget(row.budget_range)}</div>
                                <div><span style="color:#94a3b8;font-size:12px;">TIMELINE</span><br/>${formatTimeline(row.timeline)}</div>
                            </div>
                            <div><span style="color:#94a3b8;font-size:12px;">REFERRED BY</span><br/>${row.referral_code || 'Direct'}</div>
                            <div><span style="color:#94a3b8;font-size:12px;">SIGNED UP</span><br/>${new Date(row.created_at).toLocaleString()}</div>
                        </div>
                    </div>`;
                div.addEventListener('click', (e) => { if (e.target === div) div.remove(); });
                document.body.appendChild(div);
            }

function renderWaitlistTable() {
            const tableContent = document.getElementById('waitlist-table-content');

            if (allWaitlistData.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <h3>No Signups Yet</h3>
                        <p>Waitlist submissions will appear here in real-time.</p>
                    </div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Build Idea</th>
                            <th>App Type</th>
                            <th>Budget</th>
                            <th>Timeline</th>
                            <th>Referred By</th>
                            <th>Signed Up</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>`;

            allWaitlistData.forEach((row, i) => {
                const date = new Date(row.created_at);
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                const idea = row.build_idea && row.build_idea.trim()
                    ? `<span>${escapeHtml(row.build_idea)}</span>`
                    : `<span class="empty">No idea submitted</span>`;
                const referredBy = row.referral_code && row.referral_code.trim()
                    ? `<span class="referred-cell">${escapeHtml(row.referral_code)}</span>`
                    : `<span class="referred-cell organic">—</span>`;

                html += `
                    <tr>
                        <td class="row-num">${i + 1}</td>
                        <td>${escapeHtml(row.full_name || '—')}</td>
                        <td class="email-cell">${escapeHtml(row.email)}</td>
                        <td class="idea-cell">${idea}</td>
                        <td class="compact-cell">${row.app_type ? formatAppType(row.app_type) : '-'}</td>
                        <td class="compact-cell">${row.budget_range ? formatBudget(row.budget_range) : '-'}</td>
                        <td class="compact-cell">${row.timeline ? formatTimeline(row.timeline) : '-'}</td>
                        <td>${referredBy}</td>
                        <td><button onclick="showDetails(${row.id})" class="details-btn" data-row-id="${row.id}" style="background:#0EA5E9;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">View</button></td>
                        <td class="date-cell">${dateStr}, ${timeStr}</td>
                    </tr>`;
            });

            html += '</tbody></table>';
            tableContent.innerHTML = html;
        }

        function renderAffiliatesTable() {
            const tableContent = document.getElementById('affiliates-table-content');

            if (allAffiliatesData.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <h3>No Affiliates Yet</h3>
                        <p>Add your first affiliate to get started.</p>
                    </div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Link</th>
                            <th>Signups</th>
                            <th>Commission</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>`;

            allAffiliatesData.forEach(affiliate => {
                const signupCount = allWaitlistData.filter(r => r.referral_code === affiliate.referral_code).length;
                const commissionDisplay = affiliate.commission_type === 'per_signup'
                    ? `$${affiliate.commission_rate.toFixed(2)} per signup`
                    : `${affiliate.commission_rate.toFixed(0)}%`;
                const affiliateLink = `https://liftori.ai?ref=${affiliate.referral_code}`;

                html += `
                    <tr>
                        <td>${escapeHtml(affiliate.name)}</td>
                        <td><code style="background: rgba(14, 165, 233, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px;">${escapeHtml(affiliate.referral_code)}</code></td>
                        <td>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <code style="background: rgba(14, 165, 233, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 11px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${affiliateLink}</code>
                                <button class="copy-link-btn" onclick="copyAffiliateLink('${escapeHtml(affiliate.referral_code)}')">Copy</button>
                                <span class="copy-feedback">Copied!</span>
                            </div>
                        </td>
                        <td><strong>${signupCount}</strong></td>
                        <td>${commissionDisplay}</td>
                        <td>
                            <label class="status-toggle">
                                <input type="checkbox" ${affiliate.is_active ? 'checked' : ''} onchange="toggleAffiliateStatus('${affiliate.id}', ${affiliate.is_active})">
                                <span class="toggle-slider"></span>
                            </label>
                        </td>
                        <td>
                            <div class="affiliate-actions">
                                <button class="btn-action" onclick="editAffiliate('${affiliate.id}')">Edit</button>
                                <button class="btn-action danger" onclick="deleteAffiliate('${affiliate.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>`;
            });

            html += '</tbody></table>';
            tableContent.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function exportCSV() {
            if (allWaitlistData.length === 0) return;

            const headers = ['Name', 'Email', 'Build Idea', 'Referred By', 'Signed Up'];
            const rows = allWaitlistData.map(r => {
                const date = new Date(r.created_at);
                return [
                    r.full_name || '',
                    r.email,
                    r.build_idea || '',
                    r.referral_code || 'Direct',
                    date.toLocaleString()
                ];
            });

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `liftori_waitlist_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ===== INIT: check for existing session =====
        checkSession();
    </script>
