<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liftori Admin â Waitlist Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060B18;
            color: #E0F7FF;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Top nav */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.15);
            background: rgba(6, 11, 24, 0.95);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-brand h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: #E0F7FF;
        }

        .nav-brand span {
            font-size: 12px;
            font-weight: 500;
            color: #0EA5E9;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-right .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: rgba(224, 247, 255, 0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .btn-refresh {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #0EA5E9;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            background: rgba(14, 165, 233, 0.2);
            border-color: #0EA5E9;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.08);
        }

        .stat-card {
            background: rgba(14, 165, 233, 0.05);
            border: 1px solid rgba(14, 165, 233, 0.12);
            border-radius: 10px;
            padding: 20px 24px;
            flex: 1;
            max-width: 220px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            color: #0EA5E9;
            line-height: 1;
        }

        .stat-card .sub {
            font-size: 12px;
            color: rgba(224, 247, 255, 0.3);
            margin-top: 4px;
        }

        /* Main content */
        .main {
            padding: 24px 32px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: #E0F7FF;
        }

        .export-btn {
            background: transparent;
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #7DD3FC;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: #0EA5E9;
        }

        /* Table */
        .table-wrap {
            background: rgba(14, 165, 233, 0.03);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(14, 165, 233, 0.08);
        }

        th {
            text-align: left;
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(224, 247, 255, 0.4);
            border-bottom: 1px solid rgba(14, 165, 233, 0.1);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.06);
            color: #E0F7FF;
        }

        tr:hover td {
            background: rgba(14, 165, 233, 0.04);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .email-cell {
            color: #7DD3FC;
        }

        .idea-cell {
            max-width: 350px;
            color: rgba(224, 247, 255, 0.7);
            font-size: 13px;
            line-height: 1.5;
        }

        .idea-cell.empty {
            color: rgba(224, 247, 255, 0.2);
            font-style: italic;
        }

        .date-cell {
            color: rgba(224, 247, 255, 0.4);
            font-size: 13px;
            white-space: nowrap;
        }

        .row-num {
            color: rgba(224, 247, 255, 0.2);
            font-size: 13px;
            font-weight: 500;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(224, 247, 255, 0.3);
        }

        .empty-state h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: rgba(224, 247, 255, 0.2);
            margin-bottom: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #0EA5E9;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-top-color: #0EA5E9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .stats-bar { padding: 16px; gap: 12px; flex-wrap: wrap; }
            .stat-card { min-width: 140px; }
            .main { padding: 16px; }
            .table-wrap { overflow-x: auto; }
            table { min-width: 600px; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-brand">
            <h1>LIFTORI</h1>
            <span>Admin</span>
        </div>
        <div class="nav-right">
            <div class="status">
                <div class="status-dot"></div>
                <span>Supabase Connected</span>
            </div>
            <button class="btn-refresh" onclick="loadData()">Refresh</button>
        </div>
    </nav>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="label">Total Signups</div>
            <div class="value" id="stat-total">â</div>
            <div class="sub">all time</div>
        </div>
        <div class="stat-card">
            <div class="label">With Ideas</div>
            <div class="value" id="stat-ideas">â</div>
            <div class="sub">submitted a build idea</div>
        </div>
        <div class="stat-card">
            <div class="label">Today</div>
            <div class="value" id="stat-today">â</div>
            <div class="sub" id="stat-today-date"></div>
        </div>
    </div>

    <div class="main">
        <div class="section-header">
            <h2>Waitlist Signups</h2>
            <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        </div>
        <div id="error-container"></div>
        <div class="table-wrap">
            <div id="table-content">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading waitlist data...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qlerfkdyslndjbaltkwo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXJma2R5c2xuZGpiYWx0a3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTc0MTAsImV4cCI6MjA4ODczMzQxMH0.NM-bFnfWqrnelLnpYO8NNMVpwkoq4LSfCIVq6gs23qk';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allData = [];

        async function loadData() {
            const tableContent = document.getElementById('table-content');
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML = '';

            tableContent.innerHTML = '<div class="loading"><div class="spinner"></div>Loading waitlist data...</div>';

            try {
                const { data, error } = await supabase
                    .from('waitlist_signups')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allData = data || [];
                renderStats(allData);
                renderTable(allData);
            } catch (err) {
                errorContainer.innerHTML = `<div class="error-msg">Failed to load data: ${err.message}</div>`;
                tableContent.innerHTML = '';
            }
        }

        function renderStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-ideas').textContent = data.filter(r => r.build_idea && r.build_idea.trim()).length;

            const today = new Date().toISOString().split('T')[0];
            const todayCount = data.filter(r => r.created_at && r.created_at.startsWith(today)).length;
            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-today-date').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderTable(data) {
            const tableContent = document.getElementById('table-content');

            if (data.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <h3>No Signups Yet</h3>
                        <p>Waitlist submissions will appear here in real-time.</p>
                    </div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Build Idea</th>
                            <th>Signed Up</th>
                        </tr>
                    </thead>
                    <tbody>`;

            data.forEach((row, i) => {
                const date = new Date(row.created_at);
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                const idea = row.build_idea && row.build_idea.trim()
                    ? `<span>${escapeHtml(row.build_idea)}</span>`
                    : `<span class="empty">No idea submitted</span>`;

                html += `
                    <tr>
                        <td class="row-num">${i + 1}</td>
                        <td>${escapeHtml(row.full_name || 'â')}</td>
                        <td class="email-cell">${escapeHtml(row.email)}</td>
                        <td class="idea-cell">${idea}</td>
                        <td class="date-cell">${dateStr}, ${timeStr}</td>
                    </tr>`;
            });

            html += '</tbody></table>';
            tableContent.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function exportCSV() {
            if (allData.length === 0) return;

            const headers = ['Name', 'Email', 'Build Idea', 'Signed Up'];
            const rows = allData.map(r => [
                r.full_name || '',
                r.email,
                r.build_idea || '',
                new Date(r.created_at).toLocaleString()
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `liftori_waitlist_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-refresh every 30 seconds
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
